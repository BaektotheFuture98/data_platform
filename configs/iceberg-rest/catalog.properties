# Reference properties for the Iceberg REST catalog.
# The current compose stack passes these values as CATALOG_* environment
# variables because the apache/iceberg-rest-fixture image is env-driven.
# Keep this file as the human-editable source of truth when you later move
# to a REST catalog image that reads mounted properties directly.

catalog-impl=org.apache.iceberg.jdbc.JdbcCatalog
warehouse=s3://warehouse/
io-impl=org.apache.iceberg.aws.s3.S3FileIO
s3.endpoint=http://object-store:9000
s3.path-style-access=true

jdbc.uri=jdbc:postgresql://postgres:5432/iceberg_catalog
jdbc.user=iceberg
jdbc.password=iceberg
jdbc.driver=org.postgresql.Driver
