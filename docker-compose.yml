name: datalakehouse

services:
  spark-iceberg:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_BASE_IMAGE: apache/spark:${SPARK_VERSION}-scala${SCALA_BINARY_VERSION}-java17-python3-ubuntu
        ICEBERG_VERSION: ${ICEBERG_VERSION}
        SPARK_MAJOR_MINOR: ${SPARK_MAJOR_MINOR}
        SCALA_BINARY_VERSION: ${SCALA_BINARY_VERSION}
    image: datalakehouse/spark-iceberg:spark${SPARK_VERSION}-iceberg${ICEBERG_VERSION}
    container_name: spark-iceberg
    depends_on:
      - iceberg-rest
      - minio
    networks:
      - lakehouse
    ports:
      - "8888:8888"
      - "8080:8080"
      - "4040-4050:4040-4050"
      - "10000:10000"
      - "10001:10001"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./configs/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - ./workspace/notebooks:/home/iceberg/notebooks
      - ./workspace/scripts:/home/iceberg/scripts

  iceberg-rest:
    build:
      context: .
      dockerfile: docker/iceberg-rest/Dockerfile
      args:
        ICEBERG_REST_IMAGE: apache/iceberg-rest-fixture:latest
    image: datalakehouse/iceberg-rest:iceberg${ICEBERG_VERSION}
    container_name: iceberg-rest
    depends_on:
      - postgres
      - minio
    networks:
      - lakehouse
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      CATALOG_WAREHOUSE: ${CATALOG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: ${S3_ENDPOINT}
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_URI: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_JDBC_DRIVER: org.postgresql.Driver

  postgres:
    image: postgres:15
    container_name: iceberg-postgres
    networks:
      - lakehouse
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
        # Empty data directory on first startup: PostgreSQL runs *.sql files here.
      - ./configs/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./var/lib/postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: minio
    networks:
      lakehouse:
        aliases:
          - object-store
          - warehouse.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
      MINIO_CONFIG_ENV_FILE: /etc/minio/minio.env
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - ./configs/minio/minio.env:/etc/minio/minio.env:ro
      - ./var/lib/minio:/data

  mc:
    image: minio/mc
    container_name: mc
    depends_on:
      - minio
    networks:
      - lakehouse
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "/etc/mc/init-warehouse.sh"]
    volumes:
      - ./configs/mc:/etc/mc:ro
      - ./configs/minio/policies:/etc/minio/policies:ro

networks:
  lakehouse:
